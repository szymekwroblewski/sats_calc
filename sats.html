<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sats Accumulator Pro</title>

<style>
:root { --bg:#121212; --card:#1e1e1e; --text:#e0e0e0; --accent:#f7931a; --border:#333; }
body { font-family:'Segoe UI'; background:var(--bg); color:var(--text); display:flex; justify-content:center; padding:20px; }
.card { background:var(--card); padding:20px; border-radius:15px; max-width:500px; width:100%; }

.main-counter { font-size:3em; color:var(--accent); text-align:center; }
.future-val { font-size:0.75em; color:var(--accent); }
.pln-val { color:#777; }

input { width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); text-align:center; }

.history-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px; }
.history-item { background:#181818; padding:10px; border-radius:8px; text-align:center; }

.footer { margin-top:20px; text-align:center; font-size:0.8em; color:#888; }
</style>
</head>

<body>
<div class="card">

<div class="main-counter" id="sessionSats">0</div>
<div id="sessionFuture">...</div>

<input type="number" id="baseBtc" value="0.05" step="0.00000001">
<input type="number" id="dailyEur" value="12">

<div class="history-grid">
<div class="history-item"><div>Dziś</div><div id="todaySats">0</div><div id="todayFuture"></div></div>
<div class="history-item"><div>Tydzień</div><div id="weekSats">0</div><div id="weekFuture"></div></div>
<div class="history-item"><div>Miesiąc</div><div id="monthSats">0</div><div id="monthFuture"></div></div>
<div class="history-item"><div>Rok</div><div id="yearSats">0</div><div id="yearFuture"></div></div>
</div>

<div style="margin-top:20px;">
<div>Sats od daty</div>
<div id="sinceDateSats">0</div>
<div id="sinceDateFuture"></div>
</div>

<div class="footer" id="btcPriceLabel">Ładowanie ceny BTC...</div>

</div>

<script>
let btcPriceUsd = 65000;
let usdPln = 4.0;
let eurPln = 4.3;

const FUTURE_BTC_PRICE = 1000000;
const pageLoadTime = Date.now();

async function refreshData(){
    const res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
    btcPriceUsd = parseFloat((await res.json()).price);

    document.getElementById("btcPriceLabel").innerText =
        "BTC: $" + Math.floor(btcPriceUsd).toLocaleString();

    update();
}

function getDailyBtc(){
    const eur = parseFloat(document.getElementById("dailyEur").value)||0;
    const eurUsd = eurPln/usdPln;
    return (eur * eurUsd) / btcPriceUsd;
}

function formatBlock(sats){
    const btc = sats / 100000000;

    const usd = btc * btcPriceUsd;
    const pln = usd * usdPln;

    const futureUsd = btc * FUTURE_BTC_PRICE;
    const futurePln = futureUsd * usdPln;

    return `
    $${usd.toFixed(2)} <span class="pln-val">(${pln.toFixed(2)} PLN)</span><br>
    <span class="future-val">🚀 $${futureUsd.toFixed(2)} (${futurePln.toFixed(2)} PLN @ $1M)</span>
    `;
}

function update(){
    const dailyBtc = getDailyBtc();

    const sessionBtc = ((Date.now()-pageLoadTime)/86400000)*dailyBtc;
    const sessionSats = Math.floor(sessionBtc*100000000);

    document.getElementById("sessionSats").innerText = sessionSats.toLocaleString();
    document.getElementById("sessionFuture").innerHTML = formatBlock(sessionSats);

    const updateField = (id, days)=>{
        const sats = Math.floor(days*dailyBtc*100000000);
        document.getElementById(id).innerText = sats.toLocaleString();
        document.getElementById(id.replace("Sats","Future")).innerHTML = formatBlock(sats);
    }

    updateField("todaySats",1);
    updateField("weekSats",7);
    updateField("monthSats",30);
    updateField("yearSats",365);

    const sats = sessionSats;
    document.getElementById("sinceDateSats").innerText = sats.toLocaleString();
    document.getElementById("sinceDateFuture").innerHTML = formatBlock(sats);
}

setInterval(update,1000);
setInterval(refreshData,300000);

refreshData();
update();
</script>

</body>
</html>
