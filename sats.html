<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Sats Accumulator Pro</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #f7931a; --border: #333;
        }
        body.light { --bg: #f4f4f9; --card: #ffffff; --text: #333; --border: #ddd; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; transition: 0.3s; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 500px; width: 100%; text-align: center; border: 1px solid var(--border); }
        
        .live-counter { font-size: 3em; font-weight: bold; color: var(--accent); margin: 10px 0; }
        .label-small { font-size: 0.7em; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); text-align: center; font-size: 1.1em; }
        
        .history-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .history-item { background: var(--bg); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        .history-value { display: block; font-weight: bold; font-size: 0.9em; }
        .future-val { font-size: 0.7em; color: var(--accent); }
        
        .goal-box { background: var(--bg); padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid var(--accent); }
        .progress-bar { background: #444; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: var(--accent); height: 100%; width: 0%; transition: width 0.5s; }
        
        .footer { font-size: 0.8em; margin-top: 20px; color: #888; display: flex; justify-content: space-between; }
        button { cursor: pointer; background: var(--accent); border: none; padding: 5px 10px; border-radius: 5px; color: white; }
    </style>
</head>
<body id="body">

<div class="card">
    <div class="label-small">Sats kupione w tej sesji</div>
    <div class="live-counter" id="sessionSats">0</div>

    <div class="goal-box">
        <div class="label-small">Droga do 0.1 BTC</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div id="remainingText" style="font-weight:bold; font-size: 0.9em;">...</div>
        <div id="targetDate" style="font-size: 0.85em; margin-top:5px; color:var(--accent);">Planowana data: ...</div>
    </div>

    <div class="history-grid">
        <div class="history-item"><span class="label-small">Dziś</span><span class="history-value" id="todaySats">0</span><span class="future-val" id="todayFuture">$0</span></div>
        <div class="history-item"><span class="label-small">Tydzień</span><span class="history-value" id="weekSats">0</span><span class="future-val" id="weekFuture">$0</span></div>
        <div class="history-item"><span class="label-small">Miesiąc</span><span class="history-value" id="monthSats">0</span><span class="future-val" id="monthFuture">$0</span></div>
        <div class="history-item"><span class="label-small">Rok</span><span class="history-value" id="yearSats">0</span><span class="future-val" id="yearFuture">$0</span></div>
    </div>

    <div style="margin-top:20px;">
        <label class="label-small">Obecne saldo (BTC):</label>
        <input type="number" id="baseBtc" step="0.00000001" oninput="saveAndCalc()">
    </div>

    <div class="footer">
        <span id="btcPriceLabel">Cena BTC: ...</span>
        <button onclick="toggleTheme()">☀️/🌙</button>
    </div>
</div>

<script>
// Zmienne globalne na początku skryptu
let btcPriceEur = 60000;
let btcPriceUsd = 65000;
let usdToPln = 4.0;

// Funkcja tylko do pobierania danych (zmniejszamy częstotliwość!)
async function refreshData() {
    try {
        const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=eur,usd');
        const data = await res.json();
        btcPriceEur = data.bitcoin.eur;
        btcPriceUsd = data.bitcoin.usd;
        
        const curRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
        const curData = await curRes.json();
        usdToPln = curData.rates.PLN;
        
        document.getElementById('btcPriceLabel').innerText = `Cena BTC: $${btcPriceUsd.toLocaleString()}`;
    } catch (e) {
        console.error("Błąd sieci", e);
    }
}

// Główna funkcja obliczeniowa NIE powinna pobierać danych (tylko używać zmiennych)
function updateCalculations() {
    // ... tutaj Twoja logika obliczeń używająca już pobranych zmiennych btcPriceEur, etc. ...
}

// Inicjalizacja:
refreshData(); // Pobierz raz na start
setInterval(refreshData, 300000); // Pobieraj dane tylko raz na 5 minut (300 000 ms)
setInterval(updateCalculations, 500); // Obliczaj płynnie co 0.5s
</script>
</body>
</html>
