<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zegar Satoshi</title>
<style>
    body { 
        font-family: Segoe UI, sans-serif; 
        max-width: 600px; 
        margin: 40px auto; 
        padding: 0 20px;
        color: #222;
    }
    input { 
        width: 100%; 
        padding: 10px; 
        margin: 6px 0 14px 0; 
        font-size: 16px; 
        border: 1px solid #ccc; 
        border-radius: 6px;
    }
    .box { 
        padding: 15px; 
        border: 1px solid #ccc; 
        border-radius: 8px; 
        margin-top: 20px; 
        background: #fafafa;
    }
    .value { 
        font-size: 28px; 
        font-weight: bold; 
        margin-top: 10px; 
    }
</style>
</head>
<body>

<h2>Zegar liczący kupowane satoshi</h2>

<label>Aktualna cena BTC (EUR) – automatycznie:</label>
<input type="number" id="btcPrice" value="0" readonly>

<label>Ile satoshi już masz:</label>
<input type="number" id="alreadyHave" value="0">

<label>Ile satoshi chcesz mieć:</label>
<input type="number" id="target" value="100000">

<div class="box">
    <div>Tempo kupowania: <b>0.50 € / godzinę</b></div>
    <div>To daje: <span id="satPerSec"></span> sat/s</div>
</div>

<div class="box">
    <div>Aktualny stan:</div>
    <div class="value" id="current">
