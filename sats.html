<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Sats Accumulator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        .stat { font-size: 1.2em; font-weight: bold; color: #f7931a; }
    </style>
</head>
<body>

<div class="card">
    <h2>Sats Accumulator</h2>
    <p>Kurs BTC: <span id="price">Ładowanie...</span> USD</p>
    
    <label>Twoje obecne saldo (w Sats):</label>
    <input type="number" id="baseSats" value="0" oninput="calculate()">

    <p>Akumulacja: 0.50 EUR co godzinę</p>
    
    <hr>
    <p>Aktualna liczba Sats: <span class="stat" id="totalSats">0</span></p>
    <p>Wartość przy kursie 1mln USD: <span class="stat" id="futureValue">0</span> USD</p>
</div>

<script>
    const EUR_PER_HOUR = 0.50;
    const START_DATE = new Date("2026-04-24T00:00:00"); // Ustaw datę startu

    async function getBtcPrice() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd,eur');
            const data = await res.json();
            return { usd: data.bitcoin.usd, eur: data.bitcoin.eur };
        } catch (e) { return { usd: 65000, eur: 60000 }; } // fallback
    }

    async function calculate() {
        const prices = await getBtcPrice();
        document.getElementById('price').innerText = prices.usd.toLocaleString();

        const hoursElapsed = (new Date() - START_DATE) / (1000 * 60 * 60);
        const purchasedEur = hoursElapsed * EUR_PER_HOUR;
        const purchasedBtc = purchasedEur / prices.eur;
        const purchasedSats = purchasedBtc * 100_000_000;

        const baseSats = parseFloat(document.getElementById('baseSats').value) || 0;
        const totalSats = baseSats + purchasedSats;

        document.getElementById('totalSats').innerText = Math.floor(totalSats).toLocaleString();
        
        // Obliczenie wartości przy 1 mln USD
        const futureValue = (totalSats / 100_000_000) * 1000000;
        document.getElementById('futureValue').innerText = futureValue.toLocaleString(undefined, {maximumFractionDigits: 2});
    }

    setInterval(calculate, 5000); // Odświeżaj co 5 sekund
    calculate();
</script>

</body>
</html>
