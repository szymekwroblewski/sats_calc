<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BTC Dashboard</title>
<style>
    body {
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
        color: #222;
    }

    .card {
        background: white;
        padding: 18px 22px;
        margin-bottom: 18px;
        border-radius: 12px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .label {
        font-size: 14px;
        opacity: 0.65;
        margin-bottom: 6px;
    }

    .value {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 4px;
    }

    .subvalue {
        font-size: 16px;
        opacity: 0.8;
        margin-bottom: 6px;
    }

    .alt {
        font-size: 14px;
        opacity: 0.65;
        margin-top: 4px;
    }

    .progress {
        height: 14px;
        background: #ddd;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 10px;
    }

    .progress-inner {
        height: 100%;
        background: #ff8c00;
        width: 0%;
    }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ------------------------------
// KONFIGURACJA
// ------------------------------
const usdPln = 3.63; // kurs USD → PLN
const goalBtc = 0.1;

// Twoje dane (przykładowe z obrazka)
const data = {
    session: 368,
    today: 17813,
    week: 124694,
    month: 534405,
    year: 6501927,
    fromDate: 63194
};

// ------------------------------
// FUNKCJE POMOCNICZE
// ------------------------------
function satsToRealUSD(sats, btcPrice) {
    return (sats / 100000000) * btcPrice;
}

function satsToRealPLN(sats, btcPrice) {
    return satsToRealUSD(sats, btcPrice) * usdPln;
}

function satsTo1M_USD(sats) {
    return sats * 0.01; // 1 sat = 0.01 USD przy BTC = 1M
}

function satsTo1M_PLN(sats) {
    return satsTo1M_USD(sats) * usdPln;
}

function format(n) {
    return n.toLocaleString("pl-PL", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ------------------------------
// RENDER KARTY
// ------------------------------
function renderCard(title, sats, btcPrice) {
    const realUSD = satsToRealUSD(sats, btcPrice);
    const realPLN = satsToRealPLN(sats, btcPrice);

    const usd1m = satsTo1M_USD(sats);
    const pln1m = satsTo1M_PLN(sats);

    return `
        <div class="card">
            <div class="label">${title}</div>
            <div class="value">${sats.toLocaleString("pl-PL")}</div>
            <div class="subvalue">$${format(realUSD)} (${format(realPLN)} PLN)</div>

            <div class="alt">
                Gdyby BTC = 1 000 000 USD:<br>
                $${format(usd1m)} (${format(pln1m)} PLN)
            </div>
        </div>
    `;
}

// ------------------------------
// RENDER CAŁEGO DASHBOARDU
// ------------------------------
function renderDashboard() {
    const btcPrice = 78000; // ← tu wstawiasz aktualną cenę BTC

    const totalSats = data.year; // do progress bara
    const currentBtc = totalSats / 100000000;
    const progress = (currentBtc / goalBtc) * 100;

    document.getElementById("app").innerHTML = `
        ${renderCard("SATS KUPIONE W TEJ SESJI", data.session, btcPrice)}
        ${renderCard("DZIŚ", data.today, btcPrice)}
        ${renderCard("TYDZIEŃ", data.week, btcPrice)}
        ${renderCard("MIESIĄC", data.month, btcPrice)}
        ${renderCard("ROK", data.year, btcPrice)}
        ${renderCard("OD WYBRANEJ DATY", data.fromDate, btcPrice)}

        <div class="card">
            <div class="label">DROGA DO 0.1 BTC</div>
            <div class="subvalue">Brakuje: ${(goalBtc - currentBtc).toFixed(6)} BTC</div>
            <div class="progress">
                <div class="progress-inner" style="width:${progress}%"></div>
            </div>
        </div>
    `;
}

renderDashboard();
</script>

</body>
</html>
