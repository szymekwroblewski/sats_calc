<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Sats Accumulator Pro</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #f7931a; --border: #333; }
        body.light { --bg: #f4f4f9; --card: #ffffff; --text: #333; --border: #ddd; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; transition: 0.3s; margin: 0; display: flex; justify-content: center; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 500px; width: 100%; border: 1px solid var(--border); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .input-group { text-align: center; }
        .label-small { font-size: 0.65em; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); text-align: center; font-size: 1em; box-sizing: border-box; }
        .goal-box { background: var(--bg); padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid var(--accent); text-align: center; }
        .progress-bar { background: #444; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: var(--accent); height: 100%; width: 0%; transition: width 0.5s; }
        .footer { font-size: 0.8em; margin-top: 20px; color: #888; display: flex; justify-content: space-between; align-items: center; }
        button { cursor: pointer; background: var(--accent); border: none; padding: 5px 10px; border-radius: 5px; color: white; }
    </style>
</head>
<body id="body">

<div class="card">
    <div class="input-grid">
        <div class="input-group">
            <span class="label-small">Obecne saldo (BTC)</span>
            <input type="number" id="baseBtc" value="0.052" step="0.00000001" oninput="saveAndCalc()">
        </div>
        <div class="input-group">
            <span class="label-small">Kupuję/doba (EUR)</span>
            <input type="number" id="dailyEur" value="12" step="1" oninput="saveAndCalc()">
        </div>
    </div>

    <div class="goal-box">
        <div class="label-small">Droga do 0.1 BTC</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div id="remainingText" style="font-weight:bold; font-size: 0.9em;">...</div>
        <div id="targetDate" style="font-size: 0.8em; margin-top:5px; color:var(--accent);">...</div>
    </div>

    <div class="footer">
        <span id="btcPriceLabel">Cena BTC: Ładowanie...</span>
        <button onclick="document.getElementById('body').classList.toggle('light')">☀️/🌙</button>
    </div>
</div>

<script>
    const TARGET_BTC = 0.1;
    let btcPriceEur = 60000;

    window.onload = () => {
        if(localStorage.getItem('baseBtc')) document.getElementById('baseBtc').value = localStorage.getItem('baseBtc');
        if(localStorage.getItem('dailyEur')) document.getElementById('dailyEur').value = localStorage.getItem('dailyEur');
        refreshData();
    };

    function saveAndCalc() {
        localStorage.setItem('baseBtc', document.getElementById('baseBtc').value);
        localStorage.setItem('dailyEur', document.getElementById('dailyEur').value);
        updateCalculations();
    }

    async function refreshData() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=eur,usd');
            const data = await res.json();
            btcPriceEur = data.bitcoin.eur;
            document.getElementById('btcPriceLabel').innerText = `Cena BTC: $${data.bitcoin.usd.toLocaleString()}`;
            updateCalculations();
        } catch (e) { console.error("Błąd API"); }
    }

    function updateCalculations() {
        const baseBtc = parseFloat(document.getElementById('baseBtc').value) || 0;
        const dailyEur = parseFloat(document.getElementById('dailyEur').value) || 0;
        
        // Oblicz ile BTC dziennie kupujesz
        const dailyBtc = dailyEur / btcPriceEur;
        
        const remainingBtc = Math.max(0, TARGET_BTC - baseBtc);
        const daysToGoal = remainingBtc / dailyBtc;
        
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + daysToGoal);
        
        document.getElementById('remainingText').innerText = `Brakuje: ${remainingBtc.toFixed(6)} BTC`;
        document.getElementById('targetDate').innerText = `Planowana data: ${targetDate.toLocaleDateString()}`;
        document.getElementById('progressFill').style.width = Math.min(100, (baseBtc / TARGET_BTC) * 100) + "%";
    }

    setInterval(refreshData, 300000); // 5 minut
</script>
</body>
</html>
