<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Sats Accumulator Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; display: flex; justify-content: center; padding-top: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; width: 95%; text-align: center; border: 1px solid #333; }
        
        .live-counter { font-size: 3em; font-weight: bold; color: #f7931a; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .label-small { font-size: 0.7em; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #2d2d2d; color: #fff; text-align: center; font-size: 1.1em; }
        
        .history-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .history-item { background: #252525; padding: 8px; border-radius: 8px; }
        .history-value { display: block; font-weight: bold; color: #fff; font-size: 0.95em; }
        .future-val { font-size: 0.7em; color: #f7931a; display: block; }
        .pln-val { font-size: 0.65em; color: #777; }
        
        .goal-box { background: #2d2d2d; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #f7931a; }
        .progress-bar { background: #444; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: #f7931a; height: 100%; width: 0%; transition: width 0.5s; }
        .time-to-goal { font-size: 0.8em; color: #aaa; margin-top: 8px; }
        
        hr { border: 0; border-top: 1px solid #333; margin: 15px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="label-small">Sats kupione w tej sesji</div>
    <div class="live-counter" id="sessionSats">0</div>

    <div class="goal-box">
        <div class="label-small">Droga do 0.1 BTC</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div style="font-weight:bold; font-size: 0.9em;" id="remainingText">Obliczanie...</div>
        <div class="time-to-goal" id="timeToGoal">Szacowany czas: ...</div>
    </div>

    <div class="history-grid">
        <div class="history-item"><span class="label-small">Dziś</span><span class="history-value" id="todaySats">0</span><span class="future-val" id="todayFuture">$0 <span class="pln-val" id="todayPln"></span></span></div>
        <div class="history-item"><span class="label-small">Tydzień</span><span class="history-value" id="weekSats">0</span><span class="future-val" id="weekFuture">$0 <span class="pln-val" id="weekPln"></span></span></div>
        <div class="history-item"><span class="label-small">Miesiąc</span><span class="history-value" id="monthSats">0</span><span class="future-val" id="monthFuture">$0 <span class="pln-val" id="monthPln"></span></span></div>
        <div class="history-item"><span class="label-small">Rok</span><span class="history-value" id="yearSats">0</span><span class="future-val" id="yearFuture">$0 <span class="pln-val" id="yearPln"></span></span></div>
    </div>

    <hr>
    <label class="label-small">Obecne saldo (BTC):</label>
    <input type="number" id="baseBtc" value="0.00000000" step="0.00000001" oninput="saveAndCalc()">
</div>

<script>
    let btcPriceEur = 60000;
    let usdToPln = 4.0;
    const EUR_PER_HOUR = 0.50;
    const pageLoadTime = Date.now();
    const TARGET_BTC = 0.1;

    // Ładowanie zapisanego salda przy starcie
    window.onload = () => {
        const savedBtc = localStorage.getItem('userBaseBtc');
        if (savedBtc) {
            document.getElementById('baseBtc').value = savedBtc;
        }
        updateCalculations();
    };

    function saveAndCalc() {
        const val = document.getElementById('baseBtc').value;
        localStorage.setItem('userBaseBtc', val);
        updateCalculations();
    }

    async function fetchMarketData() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=eur,usd');
            const data = await res.json();
            btcPriceEur = data.bitcoin.eur;
            const currencyRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const currencyData = await currencyRes.json();
            usdToPln = currencyData.rates.PLN;
        } catch (e) {}
    }

    function updateCalculations() {
        const now = new Date();
        const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1))); startOfWeek.setHours(0,0,0,0);
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
        const startOfYear = new Date(now.getFullYear(), 0, 1);
        const diff = (ms) => (Date.now() - ms) / (1000 * 60 * 60);

        const sessionBtc = ((Date.now() - pageLoadTime) / 3600000) * (EUR_PER_HOUR / btcPriceEur);
        const baseBtc = parseFloat(document.getElementById('baseBtc').value) || 0;
        const totalBtc = baseBtc + sessionBtc;

        const remainingBtc = Math.max(0, TARGET_BTC - totalBtc);
        const remainingHours = (remainingBtc * btcPriceEur) / EUR_PER_HOUR;
        
        const years = Math.floor(remainingHours / 8760);
        const months = Math.floor((remainingHours % 8760) / 730);
        const days = Math.floor((remainingHours % 730) / 24);
        const hours = Math.floor(remainingHours % 24);
        const minutes = Math.floor((remainingHours * 60) % 60);

        document.getElementById('remainingText').innerText = `Brakuje: ${remainingBtc.toFixed(6)} BTC`;
        document.getElementById('timeToGoal').innerText = `Czas do celu: ${years}l, ${months}m, ${days}d, ${hours}h, ${minutes}m`;
        document.getElementById('progressFill').style.width = Math.min(100, (totalBtc / TARGET_BTC) * 100) + "%";

        const updateField = (id, hours) => {
            const sats = Math.floor((hours * EUR_PER_HOUR / btcPriceEur) * 100_000_000);
            const valUsd = (sats / 100_000_000) * 1000000;
            const valPln = valUsd * usdToPln;
            document.getElementById(id).innerText = sats.toLocaleString();
            document.getElementById(id.replace('Sats', 'Future')).innerHTML = `$${valUsd.toLocaleString(undefined, {maximumFractionDigits: 0})} <span class="pln-val">(${Math.floor(valPln).toLocaleString()} PLN)</span>`;
        };

        updateField('todaySats', diff(startOfToday));
        updateField('weekSats', diff(startOfWeek));
        updateField('monthSats', diff(startOfMonth));
        updateField('yearSats', diff(startOfYear));
        document.getElementById('sessionSats').innerText = Math.floor(sessionBtc * 100_000_000).toLocaleString();
    }

    fetchMarketData();
    setInterval(fetchMarketData, 600000);
    setInterval(updateCalculations, 500);
</script>
</body>
</html>
